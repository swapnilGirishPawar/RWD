<html>
  <head>
    <title>TABLE</title>
  </head>
  <body>
    <h1>First HTML Page</h1>

    <!-- Table -->
    <table border="4">
      <caption>
        My Table
      </caption>

      <tr>
        <th>Sr.No</th>
        <th>Name</th>
        <th>Age</th>
      </tr>
      <tr>
        <td>02</td>
        <td>Tushar</td>
        <td>25</td>
      </tr>
      <tr>
        <td>03</td>
        <td>Rusikesh</td>
        <td>26</td>
      </tr>
      <tr>
        <td>04</td>
        <td>Keshav</td>
        <td>23</td>
      </tr>
      <tr>
        <td>05</td>
        <td>Vitthal</td>
        <td>24</td>
      </tr>
    </table>

    <p></p>
    <!-- Forms -->
    <form>
      First name : <input type="text" name="firstName" /><br /><br />
      Last name : <input type="text" name="lastname" /><br /><br />
      Password : <input type="password" name="password" /><br /><br />
      Select Gender :
      <input type="radio" name="Sex" value="Male" /> Male
      <input type="radio" name="Sex" value="Female" /> Female<br /><br />
      Select Assets :
      <input type="checkbox" name="vehicle" value="Laptop" /> I have a laptop
      <input type="checkbox" name="vehicle" value="bike" /> I have a bike
      <input type="checkbox" name="vehicle" value="phone" /> I have a phone
      <input type="checkbox" name="vehicle" value="headphone" /> I have a
      headphone<br /><br />
      Select City :
      <select name="city">
        <option>Pune</option>
        <option>Mumbai</option>
        <option>Goa</option></select
      ><br /><br />

      <input type="submit" value="submit" />
      <input type="reset" value="cancle" />
    </form>
    <p></p>
    <!--How to insert image-->
    <img
      src="car.jpeg"
      alt="Image is broken"
      height="100"
      width="100"
    /><br /><br />

    <!--Hyler Link-->
    <a href="https://www.google.com" target="_blank">Click me</a>
    <p></p>
  </body>
</html>
