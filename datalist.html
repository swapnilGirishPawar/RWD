<html>
  <head>
    <title>New Document</title>
  </head>
  <body>
    <div>
      <p>Select your fav <mark>car</mark> :</p>
      <form action="#" method="get">
        <input list="car_brand" name="Browser" />
        <datalist id="car_brand">
          <option value="BMW"></option>
          <option value="Hyndai"></option>
          <option value="Skoda"></option>
        </datalist>
        <input type="submit" /><br />
        <p></p>
        Enter time :
        <input type="time" /><br />
        <p></p>
        Enter Email :
        <input type="email" /><br />
        <p></p>
        <input type="colour" />
      </form>
    </div>
    <p></p>

    <!--Same above form with neat paragraph-->
    <!-- Forms -->
    <form>
      First name : &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<input
        type="text"
        name="firstName"
      /><br /><br />
      Last name : &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<input
        type="text"
        name="lastname"
      /><br /><br />
      Password : &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<input
        type="password"
        name="password"
      /><br /><br />
      Select Gender : &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;

      <input type="radio" name="Sex" value="Female" /> Female<br /><br />
      Select Assets : &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
      <input type="checkbox" name="vehicle" value="Laptop" /> I have a laptop
      <input type="checkbox" name="vehicle" value="bike" /> I have a bike
      <input type="checkbox" name="vehicle" value="phone" /> I have a phone
      <input type="checkbox" name="vehicle" value="headphone" /> I have a

      Select City :
      <select name="city">
        <option>Pune</option>
        <option>Mumbai</option>
        <option>Goa</option></select
      ><br /><br />
      Select colour &nbsp;&nbsp;&nbsp; <input type="color" />

      <input type="submit" value="submit" />
      <input type="reset" value="cancle" />
    </form>
  </body>
</html>
